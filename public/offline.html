<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horivoo — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #F7F5F0;
      color: #1A1714;
      text-align: center;
      padding: 2rem;
    }
    .offline-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.5rem;
      color: #2D6A4F;
      margin-bottom: 0.5rem;
    }
    p {
      color: #8A8178;
      font-size: 0.95rem;
      max-width: 320px;
    }
    button {
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      background: #2D6A4F;
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #1B4332; }
  </style>
</head>
<body>
  <div>
    <div class="offline-icon">📵</div>
    <h1>Horivoo</h1>
    <p>Você está offline. Verifique sua conexão e tente novamente.</p>
    <button onclick="window.location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
